<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Teacher Splat Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
      }

      #ui {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 10;
        color: white;
        user-select: none;
      }

      #title {
        display: inline-block;
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        font-size: 14px;
      }

      #buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 520px;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 8px 12px;
        color: white;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        cursor: pointer;
        font-size: 13px;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      button.active {
        border-color: rgba(0, 255, 220, 0.9);
        box-shadow: 0 0 14px rgba(0, 255, 220, 0.4);
      }

      #help {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(8px);
        font-size: 12px;
        line-height: 1.7;
        max-width: 430px;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <div id="title">teacher_splat.sog</div>

      <div id="buttons">
        <button id="modeButton" class="active">鑑賞モード</button>
        <button id="backgroundButton">背景切替：Cyber</button>
        <button id="autoRotateButton" class="active">自動回転：ON</button>
        <button id="resetButton">リセット</button>
      </div>

      <div id="help">
        鑑賞モード：カメラが自動で周回 / マウスで視点操作<br />
        操作モード：WASDで移動 / Spaceでジャンプ / Q・Eで回転
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
